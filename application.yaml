eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_ADDRESS:http://localhost:8761/eureka}

# spring:
#   zipkin:
#     baseUrl: http://localhost:9411

management:
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
    sampling:
      probability: 1.0
